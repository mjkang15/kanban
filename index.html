<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== 로딩 오버레이 ===== -->
    <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="로딩 중">
        <div class="loading-spinner"></div>
    </div>

    <!-- ===== Toast 알림 컨테이너 ===== -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- ===================================================
         인증 화면 (로그인 / 회원가입)
         세션이 없을 때만 표시됨
    =================================================== -->
    <div id="auth-screen" class="auth-screen hidden">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="auth-logo" aria-hidden="true">🗂</span>
                <h1 class="auth-title">Kanban Board</h1>
                <p class="auth-subtitle">팀 협업 칸반 보드</p>
            </div>

            <!-- OAuth 버튼 -->
            <div class="oauth-buttons">
                <button id="btn-google-auth" class="btn-oauth btn-oauth-google" type="button">
                    <!-- Google SVG logo -->
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google로 계속하기
                </button>
                <button id="btn-github-auth" class="btn-oauth btn-oauth-github" type="button">
                    <!-- GitHub SVG logo -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                    </svg>
                    GitHub로 계속하기
                </button>
            </div>

            <div class="auth-divider"><span>또는</span></div>

            <!-- 로그인 / 회원가입 탭 -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tab-login"  role="tab" aria-selected="true"
                        data-target="form-login">로그인</button>
                <button class="auth-tab"        id="tab-signup" role="tab" aria-selected="false"
                        data-target="form-signup">회원가입</button>
            </div>

            <!-- 이메일 로그인 폼 -->
            <form id="form-login" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="login-email">이메일</label>
                    <input type="email" id="login-email" placeholder="이메일 주소를 입력하세요"
                           autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요"
                           autocomplete="current-password" required>
                </div>
                <p class="auth-error" id="login-error" role="alert"></p>
                <button type="submit" class="btn btn-primary btn-full">로그인</button>
            </form>

            <!-- 이메일 회원가입 폼 -->
            <form id="form-signup" class="auth-form hidden" novalidate>
                <div class="form-group">
                    <label for="signup-name">이름 <span class="required-mark">*</span></label>
                    <input type="text" id="signup-name" placeholder="이름을 입력하세요"
                           autocomplete="name" required maxlength="30">
                </div>
                <div class="form-group">
                    <label for="signup-email">이메일 <span class="required-mark">*</span></label>
                    <input type="email" id="signup-email" placeholder="이메일 주소를 입력하세요"
                           autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">비밀번호 <span class="required-mark">*</span></label>
                    <input type="password" id="signup-password" placeholder="6자 이상 입력하세요"
                           autocomplete="new-password" required minlength="6">
                </div>
                <p class="auth-error" id="signup-error" role="alert"></p>
                <button type="submit" class="btn btn-primary btn-full">회원가입</button>
            </form>
        </div>
    </div>

    <!-- ===================================================
         앱 본체 (인증 후 표시)
    =================================================== -->
    <div id="app" class="hidden">

        <!-- 앱 헤더 -->
        <header class="app-header">
            <div class="header-brand">
                <h1 class="app-title">Kanban Board</h1>
            </div>
            <div class="header-controls">
                <!-- 현재 로그인 사용자 표시 -->
                <div class="current-user">
                    <span class="avatar avatar--sm" id="header-avatar" aria-hidden="true"></span>
                    <span class="header-user-name" id="header-user-name"></span>
                    <span class="role-badge" id="header-role-badge"></span>
                </div>

                <!-- 팀 관리 버튼 (Admin만 표시) -->
                <button class="btn-team hidden" id="btn-team-manage"
                        aria-label="팀원 관리" title="팀원 관리">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>팀 관리</span>
                </button>

                <!-- 로그아웃 -->
                <button class="btn-logout" id="btn-logout" aria-label="로그아웃">로그아웃</button>
            </div>
        </header>

        <!-- 메인 보드 -->
        <main class="board-container">
            <div class="board">

                <!-- To-do 컬럼 -->
                <section class="column" id="col-todo" data-column="todo">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot todo-dot" aria-hidden="true"></span>
                            <h2 class="column-title">To-do</h2>
                        </div>
                        <span class="card-count" id="count-todo" aria-label="To-do 카드 수">0</span>
                    </div>
                    <div class="card-list" id="list-todo" data-column="todo" role="list"></div>
                    <button class="add-card-btn" data-column="todo" aria-label="To-do에 카드 추가">
                        <span class="add-icon" aria-hidden="true">+</span> 카드 추가
                    </button>
                </section>

                <!-- In Progress 컬럼 -->
                <section class="column" id="col-inprogress" data-column="inprogress">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot inprogress-dot" aria-hidden="true"></span>
                            <h2 class="column-title">In Progress</h2>
                        </div>
                        <span class="card-count" id="count-inprogress" aria-label="In Progress 카드 수">0</span>
                    </div>
                    <div class="card-list" id="list-inprogress" data-column="inprogress" role="list"></div>
                    <button class="add-card-btn" data-column="inprogress" aria-label="In Progress에 카드 추가">
                        <span class="add-icon" aria-hidden="true">+</span> 카드 추가
                    </button>
                </section>

                <!-- Done 컬럼 -->
                <section class="column" id="col-done" data-column="done">
                    <div class="column-header">
                        <div class="column-header-left">
                            <span class="column-dot done-dot" aria-hidden="true"></span>
                            <h2 class="column-title">Done</h2>
                        </div>
                        <span class="card-count" id="count-done" aria-label="Done 카드 수">0</span>
                    </div>
                    <div class="card-list" id="list-done" data-column="done" role="list"></div>
                    <button class="add-card-btn" data-column="done" aria-label="Done에 카드 추가">
                        <span class="add-icon" aria-hidden="true">+</span> 카드 추가
                    </button>
                </section>

            </div>
        </main>

    </div><!-- /#app -->

    <!-- ===== 카드 추가/수정 모달 ===== -->
    <div class="modal-overlay" id="card-modal-overlay" role="dialog"
         aria-modal="true" aria-labelledby="card-modal-title">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="card-modal-title">카드 추가</h2>
                <button class="btn-icon-close" id="card-modal-close" aria-label="모달 닫기">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="input-card-title">제목 <span class="required-mark">*</span></label>
                    <input type="text" id="input-card-title"
                           placeholder="카드 제목을 입력하세요" maxlength="100" autocomplete="off">
                    <p class="field-error" id="error-card-title">제목을 입력해 주세요.</p>
                </div>
                <div class="form-group">
                    <label for="input-card-desc">설명 <span class="optional-mark">(선택)</span></label>
                    <textarea id="input-card-desc"
                              placeholder="카드 설명을 입력하세요" rows="3" maxlength="500"></textarea>
                </div>
                <div class="form-group">
                    <label for="input-card-assignee">담당자</label>
                    <select id="input-card-assignee" class="form-select"></select>
                    <p class="form-hint" id="assignee-hint"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="card-modal-cancel">취소</button>
                <button class="btn btn-primary" id="card-modal-save">저장</button>
            </div>
        </div>
    </div>

    <!-- ===== 팀원 관리 사이드패널 ===== -->
    <div class="panel-overlay" id="team-panel-overlay"></div>
    <aside class="team-panel" id="team-panel" aria-label="팀원 관리">
        <div class="panel-header">
            <h2 class="panel-title">팀원 관리</h2>
            <button class="btn-icon-close" id="team-panel-close" aria-label="패널 닫기">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="panel-body">
            <ul class="user-list" id="user-list" aria-label="팀원 목록"></ul>
        </div>
    </aside>

    <!-- Supabase JS SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
